server:
  http: "\${SERVER_PORT:8080}"

spring:
  application:
    name: ${artifactId}
    version: ${version}
  jmx.enabled: true
  threads:
    virtual:
      enabled: true
  jpa:
    show-sql: "\${SHOW_SQL:false}"
    hibernate:
      ddl-auto: none
  datasource:
    url: "\${ANALYTICS_DB_URL:jdbc:postgresql://\${ANALYTICS_DB_HOST:localhost}:\${ANALYTICS_DB_PORT:5432}/\${ANALYTICS_DB_NAME:payhub}?currentSchema=raw}"
    username: "\${ANALYTICS_DB_USER}"
    password: "\${ANALYTICS_DB_PASSWORD}"
    driverClassName: org.postgresql.Driver
  temporal:
    namespace: "\${TEMPORAL_SERVER_NAMESPACE:pu-analytics}"
    connection:
      enable-https: "\${TEMPORAL_SERVER_ENABLE_HTTPS:false}"
      target: "\${TEMPORAL_SERVER_HOST:localhost}:\${TEMPORAL_SERVER_PORT:7233}"
    workers-auto-discovery:
      packages:
        - it.gov.pagopa.analytics.ingestion.wf
    workers:
      # generic
      - task-queue: DataIngestionWF
        capacity:
          max-concurrent-workflow-task-pollers: "\${WF_DATA_INGESTION_POLLER_SIZE:3}"
management:
  info:
    build.enabled: true
    java.enabled: true
    git.enabled: true
  observations:
    http.server:
      filter.order: -100
  endpoints:
    jmx:
      exposure.include: "*"
    web:
      exposure:
        include: health, info, prometheus, metrics
      base-path: /actuator
  endpoint:
    health:
      probes.enabled: true
      logging.slow-indicator-threshold: "\${HEALTH_ACTUATOR_LOGGER_TIMEOUT_DURATION:PT1S}"
      show-details: "\${HEALTH_ACTUATOR_SHOW_DETAILS:when-authorized}"
      group:
        readiness.include: "*"
        liveness.include: livenessState,diskSpace,ping
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${artifactId}
    export:
      prometheus:
        enabled: true
        step: 1m
        descriptions: true
    enable:
      jvm: true
      process: true
      system: true
      http: true
      logback: true

logging:
  level:
    root: "\${LOG_LEVEL_ROOT:INFO}"
    it.gov.pagopa: "\${LOG_LEVEL_PAGOPA:INFO}"
    org.springframework: "\${LOG_LEVEL_SPRING:INFO}"
    org.springframework.boot.availability: "\${LOG_LEVEL_SPRING_BOOT_AVAILABILITY:DEBUG}"
    it.gov.pagopa.analytics.ingestion.exception.ControllerExceptionHandler: "\${LOGGING_LEVEL_API_REQUEST_EXCEPTION:INFO}"
    org.springdoc.core.utils.SpringDocAnnotationsUtils: "\${LOG_LEVEL_SPRING_DOC:ERROR}"
    PERFORMANCE_LOG: "\${LOG_LEVEL_PERFORMANCE_LOG:INFO}"
    PERFORMANCE_LOG.API_REQUEST: "\${LOG_LEVEL_PERFORMANCE_LOG_API_REQUEST:\${logging.level.PERFORMANCE_LOG}}"
    PERFORMANCE_LOG.REST_INVOKE: "\${LOG_LEVEL_PERFORMANCE_LOG_REST_INVOKE:\${logging.level.PERFORMANCE_LOG}}"

springdoc:
  writer-with-default-pretty-printer: true

