server:
  http: "\${SERVER_PORT:8080}"

spring:
  application:
    name: ${artifactId}
    version: ${version}
  jmx.enabled: true
  threads:
    virtual:
      enabled: true
  jpa:
    show-sql: "\${SHOW_SQL:false}"
    hibernate:
      ddl-auto: none
  datasource:
    url: "\${ANALYTICS_DB_URL:jdbc:postgresql://\${ANALYTICS_DB_HOST:localhost}:\${ANALYTICS_DB_PORT:5432}/\${ANALYTICS_DB_NAME:analytics}?currentSchema=raw}"
    username: "\${ANALYTICS_DB_USER}"
    password: "\${ANALYTICS_DB_PASSWORD}"
    driverClassName: org.postgresql.Driver
  temporal:
    namespace: "\${TEMPORAL_SERVER_NAMESPACE:pu-analytics}"
    connection:
      enable-https: "\${TEMPORAL_SERVER_ENABLE_HTTPS:false}"
      target: "\${TEMPORAL_SERVER_HOST:localhost}:\${TEMPORAL_SERVER_PORT:7233}"
    workers-auto-discovery:
      packages:
        - it.gov.pagopa.analytics.ingestion.wf
    workers:
      # generic
      - task-queue: DataIngestionWF
        capacity:
          workflow-task-pollers-configuration:
            poller-behavior-autoscaling:
              enabled: true
              initial-concurrent-task-pollers: "\${WF_DATA_INGESTION_MIN_POLLER_SIZE:1}"
              min-concurrent-task-pollers: "\${WF_DATA_INGESTION_MIN_POLLER_SIZE:1}"
              max-concurrent-task-pollers: "\${WF_DATA_INGESTION_MAX_POLLER_SIZE:3}"
          activity-task-pollers-configuration:
            poller-behavior-autoscaling:
              enabled: true
              initial-concurrent-task-pollers: "\${ACTIVITY_DATA_INGESTION_MIN_POLLER_SIZE:1}"
              min-concurrent-task-pollers: "\${ACTIVITY_DATA_INGESTION_MIN_POLLER_SIZE:1}"
              max-concurrent-task-pollers: "\${ACTIVITY_DATA_INGESTION_MAX_POLLER_SIZE:3}"
  cloud:
    function:
      definition: paymentsConsumer;dataEventsConsumer;auditConsumer
    stream:
      binders:
        kafka-payments-consumer:
          type: kafka
          environment:
            spring.cloud.stream.kafka.binder:
              brokers: "\${KAFKA_PAYMENTS_BINDER_BROKER:\${KAFKA_BINDER_BROKER:}}"
              configuration:
                sasl.jaas.config: "\${KAFKA_PAYMENTS_CONSUMER_SASL_JAAS_CONFIG:}"
        kafka-data-events-consumer:
          type: kafka
          environment:
            spring.cloud.stream.kafka.binder:
              brokers: "\${KAFKA_DATA_EVENTS_BINDER_BROKER:\${KAFKA_BINDER_BROKER:}}"
              configuration:
                sasl.jaas.config: "\${KAFKA_DATA_EVENTS_CONSUMER_SASL_JAAS_CONFIG:}"
        kafka-audit-consumer:
          type: kafka
          environment:
            spring.cloud.stream.kafka.binder:
              brokers: "\${KAFKA_AUDIT_BINDER_BROKER:\${KAFKA_BINDER_BROKER:}}"
              configuration:
                sasl.jaas.config: "\${KAFKA_AUDIT_CONSUMER_SASL_JAAS_CONFIG:}"
      bindings:
        paymentsConsumer-in-0:
          binder: kafka-payments-consumer
          content-type: "\${KAFKA_CONTENT_TYPE:application/json}"
          destination: "\${KAFKA_TOPIC_PAYMENTS:p4pa-payhub-payments-evh}"
          group: "\${KAFKA_PAYMENTS_GROUP_ID:analytics-payments-consumer-group}"
          consumer.auto-startup: "\${KAFKA_PAYMENTS_CONSUMER_ENABLED:true}"
        dataEventsConsumer-in-0:
          binder: kafka-data-events-consumer
          content-type: "\${KAFKA_CONTENT_TYPE:application/json}"
          destination: "\${KAFKA_TOPIC_DATA_EVENTS:p4pa-payhub-data-events-evh}"
          group: "\${KAFKA_DATA_EVENTS_GROUP_ID:analytics-data-events-consumer-group}"
          consumer.auto-startup: "\${KAFKA_DATA_EVENTS_CONSUMER_ENABLED:true}"
        auditConsumer-in-0:
          binder: kafka-audit-consumer
          content-type: "\${KAFKA_CONTENT_TYPE:application/json}"
          destination: "\${KAFKA_TOPIC_AUDIT:p4pa-payhub-audit-evh}"
          group: "\${KAFKA_AUDIT_GROUP_ID:analytics-audit-consumer-group}"
          consumer.auto-startup: "\${KAFKA_AUDIT_CONSUMER_ENABLED:true}"
      kafka:
        binder:
          auto-create-topics: false
          configuration:
            heartbeat.interval.ms: "\${KAFKA_CONFIG_HEARTBEAT_INTERVAL_MS:3000}"
            session.timeout.ms: "\${KAFKA_CONFIG_SESSION_TIMEOUT_MS:30000}"
            request.timeout.ms: "\${KAFKA_CONFIG_REQUEST_TIMEOUT_MS:60000}"
            metadata.max.age.ms: "\${KAFKA_CONFIG_METADATA_MAX_AGE:180000}"
            sasl.mechanism: "\${KAFKA_CONFIG_SASL_MECHANISM:PLAIN}"
            security.protocol: "\${KAFKA_CONFIG_SECURITY_PROTOCOL:SASL_SSL}"
            max.request.size: "\${KAFKA_CONFIG_MAX_REQUEST_SIZE:1000000}"
        binders:
          paymentsConsumer-in-0:
            consumer:
              autoCommitOffset: "\${KAFKA_PAYMENTS_AUTO_COMMIT:\${KAFKA_CONSUMER_CONFIG_AUTO_COMMIT:true}}"
              configuration:
                connections.max.idle.ms: "\${KAFKA_PAYMENTS_REQUEST_CONNECTIONS_MAX_IDLE_MS:\${KAFKA_CONSUMER_CONFIG_CONNECTIONS_MAX_IDLE_MS:180000}}"
                max.poll:
                  interval.ms: "\${KAFKA_PAYMENTS_INTERVAL_TIMEOUT_MS:\${KAFKA_CONFIG_MAX_POLL_INTERVAL_TIMEOUT_MS:300000}}"
                  records: "\${KAFKA_PAYMENTS_MAX_POLL_SIZE:\${KAFKA_CONSUMER_CONFIG_MAX_POLL_SIZE:500}}"
                socket.connection.setup.timeout:
                  max.ms: "\${KAFKA_PAYMENTS_REQUEST_CONNECTION_TIMEOUT_MAX_MS:\${KAFKA_CONSUMER_CONFIG_CONNECTION_TIMEOUT_MAX_MS:200000}}"
                  ms: "\${KAFKA_PAYMENTS_REQUEST_CONNECTION_TIMEOUT_MS:\${KAFKA_CONSUMER_CONFIG_CONNECTION_TIMEOUT_MS:100000}}"
              standardHeaders: "\${KAFKA_PAYMENTS_STANDARD_HEADERS:\${KAFKA_CONSUMER_CONFIG_STANDARD_HEADERS:both}}"
              startOffset: "\${KAFKA_PAYMENTS_REQUEST_START_OFFSET:\${KAFKA_CONSUMER_CONFIG_START_OFFSET:earliest}}"
          dataEventsConsumer-in-0:
            consumer:
              autoCommitOffset: "\${KAFKA_DATA_EVENTS_AUTO_COMMIT:\${KAFKA_CONSUMER_CONFIG_AUTO_COMMIT:true}}"
              configuration:
                connections.max.idle.ms: "\${KAFKA_DATA_EVENTS_REQUEST_CONNECTIONS_MAX_IDLE_MS:\${KAFKA_CONSUMER_CONFIG_CONNECTIONS_MAX_IDLE_MS:180000}}"
                max.poll:
                  interval.ms: "\${KAFKA_DATA_EVENTS_INTERVAL_TIMEOUT_MS:\${KAFKA_CONFIG_MAX_POLL_INTERVAL_TIMEOUT_MS:300000}}"
                  records: "\${KAFKA_DATA_EVENTS_MAX_POLL_SIZE:\${KAFKA_CONSUMER_CONFIG_MAX_POLL_SIZE:500}}"
                socket.connection.setup.timeout:
                  max.ms: "\${KAFKA_DATA_EVENTS_REQUEST_CONNECTION_TIMEOUT_MAX_MS:\${KAFKA_CONSUMER_CONFIG_CONNECTION_TIMEOUT_MAX_MS:200000}}"
                  ms: "\${KAFKA_DATA_EVENTS_REQUEST_CONNECTION_TIMEOUT_MS:\${KAFKA_CONSUMER_CONFIG_CONNECTION_TIMEOUT_MS:100000}}"
              standardHeaders: "\${KAFKA_DATA_EVENTS_STANDARD_HEADERS:\${KAFKA_CONSUMER_CONFIG_STANDARD_HEADERS:both}}"
              startOffset: "\${KAFKA_DATA_EVENTS_REQUEST_START_OFFSET:\${KAFKA_CONSUMER_CONFIG_START_OFFSET:earliest}}"
          auditConsumer-in-0:
            consumer:
              autoCommitOffset: "\${KAFKA_AUDIT_AUTO_COMMIT:\${KAFKA_CONSUMER_CONFIG_AUTO_COMMIT:true}}"
              configuration:
                connections.max.idle.ms: "\${KAFKA_AUDIT_REQUEST_CONNECTIONS_MAX_IDLE_MS:\${KAFKA_CONSUMER_CONFIG_CONNECTIONS_MAX_IDLE_MS:180000}}"
                max.poll:
                  interval.ms: "\${KAFKA_AUDIT_INTERVAL_TIMEOUT_MS:\${KAFKA_CONFIG_MAX_POLL_INTERVAL_TIMEOUT_MS:300000}}"
                  records: "\${KAFKA_AUDIT_MAX_POLL_SIZE:\${KAFKA_CONSUMER_CONFIG_MAX_POLL_SIZE:500}}"
                socket.connection.setup.timeout:
                  max.ms: "\${KAFKA_AUDIT_REQUEST_CONNECTION_TIMEOUT_MAX_MS:\${KAFKA_CONSUMER_CONFIG_CONNECTION_TIMEOUT_MAX_MS:200000}}"
                  ms: "\${KAFKA_AUDIT_REQUEST_CONNECTION_TIMEOUT_MS:\${KAFKA_CONSUMER_CONFIG_CONNECTION_TIMEOUT_MS:100000}}"
              standardHeaders: "\${KAFKA_AUDIT_STANDARD_HEADERS:\${KAFKA_CONSUMER_CONFIG_STANDARD_HEADERS:both}}"
              startOffset: "\${KAFKA_AUDIT_REQUEST_START_OFFSET:\${KAFKA_CONSUMER_CONFIG_START_OFFSET:earliest}}"
management:
  info:
    build.enabled: true
    java.enabled: true
    git.enabled: true
  otlp.metrics.export.enabled: "\${TRACING_EXPORT:false}"
  tracing:
    sampling.probability: "\${TRACING_SAMPLING_PROBABILITY:1.0}"
    baggage.remote-fields:
      - X-user-id
  observations:
    http.server:
      filter.order: -100
  endpoints:
    jmx:
      exposure.include: "*"
    web:
      exposure:
        include: health, info, prometheus, metrics
      base-path: /actuator
  endpoint:
    health:
      probes.enabled: true
      logging.slow-indicator-threshold: "\${HEALTH_ACTUATOR_LOGGER_TIMEOUT_DURATION:PT1S}"
      show-details: "\${HEALTH_ACTUATOR_SHOW_DETAILS:when-authorized}"
      group:
        readiness.include: "*"
        liveness.include: livenessState,diskSpace,ping
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${artifactId}
    export:
      prometheus:
        enabled: true
        step: 1m
        descriptions: true
    enable:
      jvm: true
      process: true
      system: true
      http: true
      logback: true

logging:
  level:
    root: "\${LOG_LEVEL_ROOT:INFO}"
    it.gov.pagopa: "\${LOG_LEVEL_PAGOPA:INFO}"
    org.springframework: "\${LOG_LEVEL_SPRING:INFO}"
    org.springframework.boot.availability: "\${LOG_LEVEL_SPRING_BOOT_AVAILABILITY:DEBUG}"
    org.springframework.kafka: "\${LOG_LEVEL_SPRING_KAFKA:INFO}"
    org.apache.kafka.clients.consumer.internals.ConsumerCoordinator: "\${LOG_LEVEL_KAFKA_CONSUMER_COORDINATOR:WARN}"
    it.gov.pagopa.analytics.ingestion.exception.ControllerExceptionHandler: "\${LOGGING_LEVEL_API_REQUEST_EXCEPTION:INFO}"
    org.springdoc.core.utils.SpringDocAnnotationsUtils: "\${LOG_LEVEL_SPRING_DOC:ERROR}"
    PERFORMANCE_LOG: "\${LOG_LEVEL_PERFORMANCE_LOG:INFO}"
    PERFORMANCE_LOG.API_REQUEST: "\${LOG_LEVEL_PERFORMANCE_LOG_API_REQUEST:\${logging.level.PERFORMANCE_LOG}}"
    PERFORMANCE_LOG.REST_INVOKE: "\${LOG_LEVEL_PERFORMANCE_LOG_REST_INVOKE:\${logging.level.PERFORMANCE_LOG}}"

springdoc:
  writer-with-default-pretty-printer: true

springwolf:
  docket:
    base-package: it.gov.pagopa.analytics.ingestion.event
    info:
      title: "\${spring.application.name}"
      version: "\${spring.application.version}"
      description: AsyncAPI And Models
    servers.kafka-server:
      protocol: kafka
      host: "\${KAFKA_BINDER_BROKER:localhost:9093}"
  use-fqn: false

